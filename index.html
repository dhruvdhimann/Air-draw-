<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Air Draw Pro</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
  <div id="loading-screen">
    <div class="loader-content">
      <div class="loader-ring"></div>
      <div class="loader-logo">Air Draw</div>
      <p class="loader-text">Initializing Neural Engine...</p>
    </div>
  </div>

  <div id="app">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="output-canvas"></canvas>
    
    <div class="top-nav">
      <div class="brand">
        <i class="fa-solid fa-wand-magic-sparkles"></i>
        <span>Air Draw Pro</span>
      </div>
      <div id="status-badge" class="badge idle">
        <i class="fa-solid fa-hand-fist"></i>
        <span>Idle</span>
      </div>
    </div>

    <div class="side-bar">
      <button id="btn-save" class="glass-btn action-btn save-btn">
        <i class="fa-solid fa-download"></i>
        <span>Save (👍)</span>
      </button>
      <button id="btn-undo" class="glass-btn action-btn undo-btn">
        <i class="fa-solid fa-rotate-left"></i>
        <span>Undo (✋)</span>
      </button>
      <button id="btn-clear" class="glass-btn action-btn">
        <i class="fa-solid fa-trash-can"></i>
        <span>Clear</span>
      </button>
    </div>

    <div id="toolbar" class="glass-panel">
      <!-- Brush Type -->
      <div class="toolbar-section">
        <span class="section-label">BRUSH</span>
        <div class="brush-types">
          <button class="mode-btn active" data-mode="neon" title="Neon Glow"><i class="fa-solid fa-lightbulb"></i></button>
          <button class="mode-btn" data-mode="sparkle" title="Sparkle Magic"><i class="fa-solid fa-wand-magic-sparkles"></i></button>
          <button class="mode-btn" data-mode="solid" title="Solid Pen"><i class="fa-solid fa-pen"></i></button>
          <button class="mode-btn" data-mode="rainbow" title="Rainbow Magic"><i class="fa-solid fa-rainbow"></i></button>
        </div>
      </div>
      <div class="toolbar-divider"></div>

      <div class="toolbar-section">
        <span class="section-label">COLORS</span>
        <div class="palette">
          <div class="color active" data-color="#ff00e5" style="--c: #ff00e5;"></div>
          <div class="color" data-color="#00f0ff" style="--c: #00f0ff;"></div>
          <div class="color" data-color="#39ff14" style="--c: #39ff14;"></div>
          <div class="color" data-color="#ffaa00" style="--c: #ffaa00;"></div>
          <div class="color" data-color="#ffffff" style="--c: #ffffff;"></div>
        </div>
      </div>
      
      <div class="toolbar-divider"></div>

      <div class="toolbar-section">
        <span class="section-label">BRUSH SIZE</span>
        <div class="slider-container">
          <i class="fa-solid fa-pen" style="font-size: 10px; color: rgba(255,255,255,0.5);"></i>
          <input type="range" id="size-slider" min="5" max="50" value="15">
          <i class="fa-solid fa-pen" style="font-size: 16px; color: rgba(255,255,255,0.8);"></i>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="main.js"></script>
</body>
</html>
